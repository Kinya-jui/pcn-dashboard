name: PCN Data Pipeline

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      KOBO_TOKEN:     ${{ secrets.KOBO_TOKEN }}
      KOBO_TOOL1_UID: ${{ secrets.KOBO_TOOL1_UID }}
      KOBO_TOOL2_UID: ${{ secrets.KOBO_TOOL2_UID }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'

      - uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r

      - name: Install R packages
        run: |
          Rscript -e "
            pkgs <- c('httr2','jsonlite','dplyr','readr','tidyr','stringr','purrr','curl', 'DBI', 'RPostgres')
            missing <- pkgs[!pkgs %in% installed.packages()[,'Package']]
            if (length(missing) > 0) install.packages(missing, repos='https://cloud.r-project.org')
          "

      - run: mkdir -p data

      - name: Step 1 - Pull Tool 1 data from KoboToolbox
        run: Rscript pipeline/01_pull_tool1_from_kobo.R

      - name: Step 2 - Analyse and map to Tool 2 field names
        run: Rscript pipeline/02_analyse_and_map_to_tool2.R

      - name: Step 3 - Generate pcn_lookup.csv for pulldata
        run: Rscript pipeline/03_generate_pulldata_csv.R

      - name: Step 4 - Write data to Supabase
        run: Rscript pipeline/04_write_to_supabase.R
        env:
           SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
           SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
           SUPABASE_PASS: ${{ secrets.SUPABASE_PASS }}

      - name: Step 5 - Pull Tool 2 submissions to Supabase
        run: Rscript pipeline/05_pull_tool2_from_kobo.R
        env:
          KOBO_TOKEN:    ${{ secrets.KOBO_TOKEN }}
          KOBO_TOOL2_UID: ${{ secrets.KOBO_TOOL2_UID }}
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASS: ${{ secrets.SUPABASE_PASS }}
          
      - name: "Step 6 - Sync PCN establishment from Google Sheets"
        run: Rscript pipeline/06_sync_establishment_from_gsheet.R
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASS: ${{ secrets.SUPABASE_PASS }}
          PCN_SHEET_ID: ${{ secrets.PCN_SHEET_ID }}
          GSHEET_SA_KEY: ${{ secrets.GSHEET_SA_KEY }}
          
      - name: Commit pcn_lookup.csv to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pcn_lookup.csv
          git diff --staged --quiet || git commit -m "chore: update pcn_lookup.csv [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Upload outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ github.run_number }}
          path: data/
          retention-days: 14
